name: daily-edition

# Runs Mon–Fri at 23:30 UTC = 05:00 IST Tue–Sat (publication schedule).
# Manual dispatch supported via the Actions tab.
on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build artifacts but skip WhatsApp + commit"
        required: false
        default: "false"

permissions:
  contents: write   # push the new edition back to main
  models: read      # call GitHub Models inference endpoint with GITHUB_TOKEN

concurrency:
  group: daily-edition
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run edition pipeline
        id: run_edition
        env:
          # GitHub Models — auth via the workflow's auto-issued token. No secret to manage.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional fallback if you ever add Gemini free tier:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Email delivery — Gmail SMTP, free, ~500/day on personal account.
          # Required for subscriber broadcast + admin self-notifications.
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO_SELF: ${{ secrets.EMAIL_TO_SELF }}
          # WhatsApp delivery (all optional — module no-ops cleanly if absent)
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python pipeline/run_edition.py

      - name: Commit and push new edition
        if: ${{ inputs.dry_run != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "nutrient-brief-bot"
          git config user.email "bot@nutrientbrief.in"
          # Stage everything FIRST (incl. untracked new-edition folders),
          # THEN check if anything is now staged. Old version checked before
          # staging and missed all untracked files — silently skipped commits.
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git commit -m "edition: automated publish $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
          echo "Pushed."

      - name: Append to run log
        if: ${{ always() }}
        run: |
          mkdir -p pipeline/logs
          {
            echo "---"
            echo "run_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "status: ${{ job.status }}"
            echo "trigger: ${{ github.event_name }}"
          } >> pipeline/logs/ci-$(date -u +%Y-%m).log

      - name: Upload run artifacts (debugging)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: edition-failure-${{ github.run_id }}
          path: |
            pipeline/logs/
            content/drafts/
          retention-days: 14
